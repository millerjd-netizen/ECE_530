name: Run Unit Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run Assignment 1 Tests
        run: |
          cd Assignment1_AirportFinder
          pip install -r requirements.txt
          PYTHONPATH=. pytest

      - name: Run Project 1 Tests
        run: |
          cd natural_llm_SQL
          pip install -r requirements.txt
          PYTHONPATH=. pytest

      - name: Run Project 2 Tests
        run: |
          cd EC530-Project2
          pip install -r requirements.txt
          PYTHONPATH=. pytest